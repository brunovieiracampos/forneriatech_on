<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Forneria Tech — Em breve</title>
<meta name="description" content="O sistema inteligente para pizzarias que fazem história. Gerencie pedidos, equipe, cardápio e entregas em um só lugar.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'DM Sans',sans-serif;
    -webkit-font-smoothing:antialiased;
    color:#1E1E1E;
    background:#F5EFE6;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:48px 22px;
    position:relative;
    overflow-x:hidden;
  }

  /* decorative ambient shapes */
  .shape{position:fixed;border-radius:50%;pointer-events:none;z-index:0}
  .shape-1{width:560px;height:560px;background:radial-gradient(circle,rgba(196,92,46,0.10),transparent 70%);top:-180px;right:-140px}
  .shape-2{width:500px;height:500px;background:radial-gradient(circle,rgba(61,107,79,0.08),transparent 70%);bottom:-170px;left:-130px}
  .shape-3{width:300px;height:300px;background:radial-gradient(circle,rgba(196,92,46,0.06),transparent 70%);bottom:10%;right:-80px}

  .wrap{position:relative;z-index:1;width:100%;max-width:600px;text-align:center}

  /* logo */
  .logo{display:flex;flex-direction:column;align-items:center;gap:15px;margin-bottom:34px}
  .logo-mark{
    width:64px;height:64px;border-radius:17px;background:#C45C2E;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 8px 22px rgba(196,92,46,0.28);
  }
  .logo-name{font-family:'DM Serif Display',serif;font-size:30px;line-height:1;color:#1E1E1E}
  .logo-sub{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#9c968d;margin-top:5px}

  /* badge */
  .badge{
    display:inline-flex;align-items:center;gap:8px;
    background:#EDE3D4;border:1px solid #D9CFC3;border-radius:30px;
    padding:8px 16px;font-size:12.5px;font-weight:600;color:#C45C2E;
    letter-spacing:.4px;margin-bottom:28px;
  }
  .badge .dot{width:8px;height:8px;border-radius:50%;background:#C45C2E;position:relative}
  .badge .dot::after{
    content:"";position:absolute;inset:-4px;border-radius:50%;
    background:rgba(196,92,46,0.35);animation:pulse 2s ease-out infinite;
  }
  @keyframes pulse{0%{transform:scale(.6);opacity:.8}100%{transform:scale(1.8);opacity:0}}

  /* headline */
  h1{
    font-family:'DM Serif Display',serif;
    font-weight:400;
    font-size:clamp(34px,6vw,54px);
    line-height:1.08;
    color:#1E1E1E;
    letter-spacing:-0.5px;
    margin-bottom:22px;
    text-wrap:balance;
  }
  h1 .accent{color:#C45C2E;font-style:italic}

  .subtitle{
    font-size:clamp(15px,2.4vw,18px);
    line-height:1.6;
    color:#6B6B6B;
    max-width:480px;
    margin:0 auto 36px auto;
    text-wrap:pretty;
  }

  /* form */
  form{
    display:flex;gap:10px;width:100%;max-width:480px;margin:0 auto;
    background:#EDE3D4;border:1px solid #D9CFC3;border-radius:14px;
    padding:8px;box-shadow:0 8px 28px rgba(30,30,30,0.06);
  }
  .field{flex:1;display:flex;align-items:center;gap:10px;padding-left:14px;min-width:0}
  .field svg{flex-shrink:0}
  input[type=email]{
    flex:1;width:100%;border:none;background:transparent;outline:none;
    font-family:inherit;font-size:15px;color:#1E1E1E;padding:13px 0;min-width:0;
  }
  input[type=email]::placeholder{color:#a99f92}
  button{
    flex-shrink:0;display:inline-flex;align-items:center;gap:8px;
    background:#C45C2E;color:#fff;border:none;border-radius:9px;
    padding:14px 22px;font-family:inherit;font-size:15px;font-weight:700;
    cursor:pointer;transition:background .14s,transform .08s;white-space:nowrap;
  }
  button:hover{background:#ad4f26}
  button:active{transform:translateY(1px)}

  .hint{font-size:12.5px;color:#a99f92;margin-top:16px}

  /* footer */
  footer{
    position:relative;z-index:1;margin-top:auto;padding-top:54px;
    font-size:13px;color:#9c968d;text-align:center;line-height:1.6;
  }
  footer a{color:#6B6B6B;text-decoration:none;font-weight:500}
  footer a:hover{color:#C45C2E}

  /* mobile */
  @media (max-width:560px){
    form{flex-direction:column;gap:8px;padding:10px}
    .field{padding:4px 0 4px 14px}
    button{justify-content:center;padding:14px}
    .badge{margin-bottom:22px}
  }
</style>
</head>
<body>
  <div class="shape shape-1"></div>
  <div class="shape shape-2"></div>
  <div class="shape shape-3"></div>

  <div class="wrap">

    <!-- LOGO -->
    <div class="logo">
      <div class="logo-mark">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2.5c5.25 0 9.5 4.25 9.5 9.5 0 .69-.07 1.36-.21 2.01L12 21.5 2.71 14.01A9.6 9.6 0 0 1 2.5 12c0-5.25 4.25-9.5 9.5-9.5Z" fill="#C45C2E" stroke="#F5EFE6" stroke-width="1.3" stroke-linejoin="round"/>
          <circle cx="9" cy="10" r="1.35" fill="#F5EFE6"/>
          <circle cx="14" cy="9" r="1.2" fill="#F5EFE6"/>
          <circle cx="13" cy="14" r="1.35" fill="#F5EFE6"/>
        </svg>
      </div>
      <div>
        <div class="logo-name">Forneria</div>
        <div class="logo-sub">Tech</div>
      </div>
    </div>

    <!-- BADGE -->
    <div class="badge"><span class="dot"></span>Em breve</div>

    <!-- HEADLINE -->
    <h1>O sistema inteligente para pizzarias que <span class="accent">fazem história.</span></h1>

    <p class="subtitle">Gerencie pedidos, equipe, cardápio e entregas em um só lugar. Em breve disponível para sua pizzaria.</p>

    <!-- FORM (visual only) -->
    <form onsubmit="return false;">
      <div class="field">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none"><rect x="3" y="5" width="18" height="14" rx="2" stroke="#9c968d" stroke-width="1.6"/><path d="M4 7l8 6 8-6" stroke="#9c968d" stroke-width="1.6" stroke-linejoin="round"/></svg>
        <input type="email" placeholder="Seu melhor e-mail" aria-label="E-mail">
      </div>
      <button type="submit">
        Quero ser avisado
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none"><path d="M5 12h14M13 6l6 6-6 6" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </form>

    <div class="hint">Avisamos você assim que o Forneria estiver disponível. Sem spam.</div>
  </div>

  <footer>
    © 2026 Forneria Tech · <a><span class="__cf_email__" data-cfemail="f5969a9b8194819ab5939a879b90879c948190969ddb969a98db9787">contato@forneriatech.com.br</span></a>
  </footer>
<script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script></body>
</html>
